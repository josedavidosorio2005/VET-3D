<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VET-3D Anatomical Atlas</title>
    <link rel="canonical" href="/">
    <script>
        window.location.replace('/?from=atlas')
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #080d1a;
            --bg-card: rgba(10, 20, 40, 0.85);
            --hotspot: #f5c518;
            --bone-main: #e8dcc8;
            --bone-glow: #f5f0e8;
            --muscle: #8b1a1a;
            --muscle-light: #c0392b;
            --fascia: #d8858a;
            --text-gray: #a8b2c1;
            --text-white: #ffffff;
            --text-red: #e74c3c;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background: var(--bg-deep);
            color: var(--text-white);
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            background: rgba(10, 20, 40, 0.9);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
        }

        .structures-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 8px 0;
        }

        .structures-list li {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-gray);
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .structures-list li:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--hotspot);
        }

        .structures-list li.active {
            background: rgba(245, 197, 24, 0.1);
            border-left-color: var(--hotspot);
            color: var(--hotspot);
        }

        .canvas-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .canvas-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .mode-toggle {
            background: rgba(245, 197, 24, 0.9);
            color: #080d1a;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-toggle:hover {
            background: rgba(245, 197, 24, 1);
            transform: scale(1.05);
        }

        svg {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 0 20px rgba(245, 197, 24, 0.1));
        }

        .hotspot {
            cursor: pointer;
            transition: all 0.3s ease-out;
        }

        .hotspot circle {
            fill: var(--hotspot);
            stroke: var(--text-white);
            stroke-width: 2;
            filter: drop-shadow(0 0 4px rgba(245, 197, 24, 0.6));
            animation: pulse 2s infinite;
        }

        .hotspot.active circle {
            r: 18;
            filter: drop-shadow(0 0 12px rgba(245, 197, 24, 1));
            animation: pulse-active 0.6s ease-out;
        }

        @keyframes pulse {
            0%, 100% {
                r: 12;
                opacity: 0.8;
            }
            50% {
                r: 14;
                opacity: 1;
            }
        }

        @keyframes pulse-active {
            0% {
                r: 12;
            }
            100% {
                r: 18;
            }
        }

        .annotation-card {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px;
            min-width: 220px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .annotation-card.visible {
            opacity: 1;
            pointer-events: all;
        }

        .annotation-card.faded {
            opacity: 0.2;
        }

        .card-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 12px;
        }

        .card-latin {
            font-size: 11px;
            font-style: italic;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .card-detail {
            font-size: 11px;
            color: var(--text-white);
            margin-bottom: 8px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-pathology {
            font-size: 11px;
            color: var(--text-red);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-pathology-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-red);
            margin-bottom: 4px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                max-height: 120px;
            }

            .structures-list {
                flex-direction: row;
                overflow-x: auto;
            }

            .structures-list li {
                white-space: nowrap;
                border-left: none;
                border-bottom: 3px solid transparent;
            }

            .structures-list li.active {
                border-left: none;
                border-bottom-color: var(--hotspot);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">Structures</div>
            <ul class="structures-list" id="structuresList"></ul>
        </aside>

        <main class="canvas-container">
            <div class="canvas-controls">
                <button class="mode-toggle" id="modeToggle">Skeleton Mode</button>
            </div>

            <svg viewBox="0 0 800 1000" width="600" height="750" id="anatomySvg">
                <defs>
                    <filter id="boneGlow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
                    </filter>
                    <filter id="hotspotGlow" x="-100%" y="-100%" width="300%" height="300%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.8" />
                        </feComponentTransfer>
                    </filter>
                </defs>

                <!-- Star field background -->
                <rect width="800" height="1000" fill="#080d1a" />
                <circle cx="50" cy="80" r="1.5" fill="white" opacity="0.6" />
                <circle cx="150" cy="120" r="1" fill="white" opacity="0.4" />
                <circle cx="250" cy="60" r="1.2" fill="white" opacity="0.7" />
                <circle cx="350" cy="150" r="0.8" fill="white" opacity="0.5" />
                <circle cx="450" cy="90" r="1" fill="white" opacity="0.6" />
                <circle cx="550" cy="110" r="1.3" fill="white" opacity="0.7" />
                <circle cx="650" cy="70" r="0.9" fill="white" opacity="0.4" />
                <circle cx="750" cy="130" r="1.1" fill="white" opacity="0.6" />
                <circle cx="100" cy="250" r="1" fill="white" opacity="0.5" />
                <circle cx="700" cy="200" r="1.2" fill="white" opacity="0.6" />
                <circle cx="200" cy="300" r="0.8" fill="white" opacity="0.4" />
                <circle cx="600" cy="280" r="1" fill="white" opacity="0.5" />

                <!-- Dog silhouette background -->
                <g id="silhouetteLayer" opacity="0.15">
                    <ellipse cx="400" cy="500" rx="180" ry="250" fill="black" />
                </g>

                <!-- Skeleton Layer -->
                <g id="skeleton" class="anatomyLayer">
                    <!-- Skull -->
                    <g id="skull" filter="url(#boneGlow)">
                        <ellipse cx="400" cy="200" rx="60" ry="65" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Cranium -->
                        <path d="M 350 170 Q 370 140 400 140 Q 430 140 450 170 L 450 200 Q 430 220 400 225 Q 370 220 350 200 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Zygomatic arch -->
                        <path d="M 460 190 L 500 185" stroke="#f5f0e8" stroke-width="2" fill="none" />
                        <!-- Mandible outline -->
                        <path d="M 360 240 L 440 240 L 445 260 L 355 260 Z" fill="#c9b99a" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Teeth suggestion -->
                        <line x1="370" y1="240" x2="370" y2="250" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="385" y1="240" x2="385" y2="250" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="400" y1="240" x2="400" y2="250" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="415" y1="240" x2="415" y2="250" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="430" y1="240" x2="430" y2="250" stroke="#f5f0e8" stroke-width="1" />
                    </g>

                    <!-- Spine -->
                    <g id="spine" filter="url(#boneGlow)">
                        <!-- Cervical vertebrae -->
                        <circle cx="400" cy="270" r="8" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <circle cx="400" cy="300" r="8" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Thoracic vertebrae -->
                        <circle cx="400" cy="330" r="9" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="400" y1="321" x2="400" y2="310" stroke="#f5f0e8" stroke-width="1.5" />
                        <circle cx="400" cy="365" r="9" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="400" y1="356" x2="400" y2="345" stroke="#f5f0e8" stroke-width="1.5" />
                        <circle cx="400" cy="400" r="9" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="400" y1="391" x2="400" y2="380" stroke="#f5f0e8" stroke-width="1.5" />
                        <!-- Lumbar vertebrae -->
                        <circle cx="400" cy="440" r="10" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <circle cx="400" cy="480" r="10" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Sacrum -->
                        <path d="M 390 515 L 410 515 L 410 545 L 390 545 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Caudal vertebrae -->
                        <circle cx="400" cy="565" r="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <circle cx="400" cy="585" r="5" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                    </g>

                    <!-- Ribs and Thorax -->
                    <g id="thorax" filter="url(#boneGlow)">
                        <!-- Sternum -->
                        <rect x="380" y="330" width="40" height="90" fill="#c9b99a" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Left ribs -->
                        <path d="M 380 340 Q 300 320 280 380" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 380 360 Q 290 355 270 420" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 380 380 Q 295 390 280 460" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 380 400 Q 310 420 300 490" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <!-- Right ribs -->
                        <path d="M 420 340 Q 500 320 520 380" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 420 360 Q 510 355 530 420" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 420 380 Q 505 390 520 460" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                        <path d="M 420 400 Q 490 420 500 490" stroke="#f5f0e8" stroke-width="1.5" fill="none" />
                    </g>

                    <!-- Forelimb Bones -->
                    <g id="forelimb-left" filter="url(#boneGlow)">
                        <!-- Scapula -->
                        <path d="M 320 310 L 330 340 L 340 350 L 335 320 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Humerus -->
                        <rect x="315" y="350" width="12" height="70" rx="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Radius -->
                        <rect x="310" y="420" width="8" height="60" rx="4" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Ulna -->
                        <rect x="320" y="420" width="8" height="65" rx="4" fill="#c9b99a" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Olecranon -->
                        <circle cx="324" cy="415" r="4" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Carpals -->
                        <rect x="308" y="485" width="16" height="12" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Metacarpals -->
                        <line x1="310" y1="497" x2="310" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="318" y1="497" x2="318" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="325" y1="497" x2="325" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Phalanges -->
                        <rect x="307" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="315" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="323" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                    </g>

                    <g id="forelimb-right" filter="url(#boneGlow)">
                        <!-- Scapula -->
                        <path d="M 480 310 L 470 340 L 460 350 L 465 320 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Humerus -->
                        <rect x="473" y="350" width="12" height="70" rx="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Radius -->
                        <rect x="482" y="420" width="8" height="60" rx="4" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Ulna -->
                        <rect x="472" y="420" width="8" height="65" rx="4" fill="#c9b99a" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Olecranon -->
                        <circle cx="476" cy="415" r="4" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Carpals -->
                        <rect x="476" y="485" width="16" height="12" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Metacarpals -->
                        <line x1="482" y1="497" x2="482" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="490" y1="497" x2="490" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="497" y1="497" x2="497" y2="540" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Phalanges -->
                        <rect x="480" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="488" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="496" y="540" width="3" height="20" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                    </g>

                    <!-- Pelvis -->
                    <g id="pelvis" filter="url(#boneGlow)">
                        <!-- Ilium left -->
                        <path d="M 350 500 L 340 520 L 350 540 L 370 530 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Ilium right -->
                        <path d="M 450 500 L 460 520 L 450 540 L 430 530 Z" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Pubis -->
                        <ellipse cx="400" cy="550" rx="35" ry="15" fill="#c9b99a" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Acetabulum left -->
                        <circle cx="360" cy="530" r="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Acetabulum right -->
                        <circle cx="440" cy="530" r="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                    </g>

                    <!-- Hindlimb Bones -->
                    <g id="hindlimb-left" filter="url(#boneGlow)">
                        <!-- Femur -->
                        <rect x="360" y="560" width="14" height="100" rx="7" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Greater trochanter -->
                        <circle cx="367" cy="560" r="5" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Patella -->
                        <ellipse cx="367" cy="670" rx="6" ry="10" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Tibia -->
                        <rect x="358" y="685" width="12" height="85" rx="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Tibial crest -->
                        <line x1="364" y1="685" x2="364" y2="700" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Fibula -->
                        <rect x="372" y="690" width="6" height="80" rx="3" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Tarsals -->
                        <rect x="356" y="770" width="16" height="14" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Metatarsals -->
                        <line x1="358" y1="784" x2="358" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="366" y1="784" x2="366" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="373" y1="784" x2="373" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Phalanges -->
                        <rect x="355" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="363" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="371" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                    </g>

                    <g id="hindlimb-right" filter="url(#boneGlow)">
                        <!-- Femur -->
                        <rect x="426" y="560" width="14" height="100" rx="7" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Greater trochanter -->
                        <circle cx="433" cy="560" r="5" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Patella -->
                        <ellipse cx="433" cy="670" rx="6" ry="10" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Tibia -->
                        <rect x="426" y="685" width="12" height="85" rx="6" fill="#e8dcc8" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Tibial crest -->
                        <line x1="432" y1="685" x2="432" y2="700" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Fibula -->
                        <rect x="440" y="690" width="6" height="80" rx="3" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Tarsals -->
                        <rect x="424" y="770" width="16" height="14" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <!-- Metatarsals -->
                        <line x1="427" y1="784" x2="427" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="434" y1="784" x2="434" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <line x1="441" y1="784" x2="441" y2="825" stroke="#f5f0e8" stroke-width="1" />
                        <!-- Phalanges -->
                        <rect x="424" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="432" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                        <rect x="440" y="825" width="3" height="18" fill="#c9b99a" stroke="#f5f0e8" stroke-width="0.5" />
                    </g>
                </g>

                <!-- Muscle Layer (hidden by default) -->
                <g id="muscles" class="anatomyLayer" style="display: none;">
                    <!-- Facial muscles -->
                    <ellipse cx="400" cy="210" rx="45" ry="50" fill="#8b1a1a" stroke="none" opacity="0.7" />
                    <path d="M 380 200 Q 385 190 390 200" stroke="#b84848" stroke-width="1" fill="none" />
                    <path d="M 410 200 Q 415 190 420 200" stroke="#b84848" stroke-width="1" fill="none" />
                    
                    <!-- Neck muscles -->
                    <ellipse cx="400" cy="280" rx="50" ry="40" fill="#c0392b" stroke="none" opacity="0.8" />
                    <path d="M 380 270 Q 400 260 420 270" stroke="#b84848" stroke-width="1" fill="none" />
                    
                    <!-- Thoracic muscles -->
                    <ellipse cx="360" cy="350" rx="45" ry="80" fill="#a83a33" stroke="none" opacity="0.8" />
                    <ellipse cx="440" cy="350" rx="45" ry="80" fill="#a83a33" stroke="none" opacity="0.8" />
                    <path d="M 330 350 Q 360 340 390 350" stroke="#c0755e" stroke-width="0.5" fill="none" />
                    <path d="M 410 350 Q 440 340 470 350" stroke="#c0755e" stroke-width="0.5" fill="none" />
                    
                    <!-- Abdominal muscles -->
                    <ellipse cx="400" cy="450" rx="70" ry="60" fill="#8b1a1a" stroke="none" opacity="0.7" />
                    <path d="M 370 420 L 370 480 M 400 420 L 400 480 M 430 420 L 430 480" stroke="#c0755e" stroke-width="1" fill="none" />
                    
                    <!-- Forelimb muscles -->
                    <ellipse cx="330" cy="380" rx="25" ry="50" fill="#c0392b" stroke="none" opacity="0.8" />
                    <ellipse cx="470" cy="380" rx="25" ry="50" fill="#c0392b" stroke="none" opacity="0.8" />
                    <path d="M 320 360 L 330 410" stroke="#d97a7a" stroke-width="0.5" fill="none" />
                    <path d="M 480 360 L 470 410" stroke="#d97a7a" stroke-width="0.5" fill="none" />
                    
                    <!-- Hindlimb muscles -->
                    <ellipse cx="360" cy="620" rx="30" ry="70" fill="#a83a33" stroke="none" opacity="0.8" />
                    <ellipse cx="440" cy="620" rx="30" ry="70" fill="#a83a33" stroke="none" opacity="0.8" />
                    <path d="M 350 580 L 360 680" stroke="#d97a7a" stroke-width="0.5" fill="none" />
                    <path d="M 450 580 L 440 680" stroke="#d97a7a" stroke-width="0.5" fill="none" />
                    
                    <!-- Fasciae in lighter pink -->
                    <path d="M 320 300 Q 400 290 480 300" stroke="#d8858a" stroke-width="1" fill="none" opacity="0.6" />
                </g>

                <!-- Hotspots Layer -->
                <g id="hotspots">
                    <g class="hotspot" data-id="skull">
                        <circle cx="400" cy="200" r="12" />
                    </g>
                    <g class="hotspot" data-id="mandible">
                        <circle cx="400" cy="250" r="12" />
                    </g>
                    <g class="hotspot" data-id="scapula-left">
                        <circle cx="330" cy="330" r="12" />
                    </g>
                    <g class="hotspot" data-id="scapula-right">
                        <circle cx="470" cy="330" r="12" />
                    </g>
                    <g class="hotspot" data-id="humerus-left">
                        <circle cx="320" cy="385" r="12" />
                    </g>
                    <g class="hotspot" data-id="humerus-right">
                        <circle cx="480" cy="385" r="12" />
                    </g>
                    <g class="hotspot" data-id="radius-ulna-left">
                        <circle cx="315" cy="450" r="12" />
                    </g>
                    <g class="hotspot" data-id="radius-ulna-right">
                        <circle cx="485" cy="450" r="12" />
                    </g>
                    <g class="hotspot" data-id="thoracic-vertebra">
                        <circle cx="400" cy="365" r="12" />
                    </g>
                    <g class="hotspot" data-id="pelvis">
                        <circle cx="400" cy="530" r="12" />
                    </g>
                    <g class="hotspot" data-id="femur-left">
                        <circle cx="360" cy="610" r="12" />
                    </g>
                    <g class="hotspot" data-id="femur-right">
                        <circle cx="440" cy="610" r="12" />
                    </g>
                    <g class="hotspot" data-id="tibia-fibula-left">
                        <circle cx="360" cy="730" r="12" />
                    </g>
                    <g class="hotspot" data-id="tibia-fibula-right">
                        <circle cx="440" cy="730" r="12" />
                    </g>
                    <g class="hotspot" data-id="patella-left">
                        <circle cx="367" cy="670" r="12" />
                    </g>
                    <g class="hotspot" data-id="patella-right">
                        <circle cx="433" cy="670" r="12" />
                    </g>
                </g>
            </svg>

            <!-- Annotation Cards Container -->
            <div id="cardsContainer"></div>
        </main>
    </div>

    <script>
        // Anatomical structures database
        const structures = [
            {
                id: 'skull',
                name: 'Skull',
                latinName: 'Cranium',
                detail: 'Protects brain and forms facial structure',
                pathology: 'Trauma, fractures, neoplasias'
            },
            {
                id: 'mandible',
                name: 'Mandible',
                latinName: 'Mandíbula',
                detail: 'Mobile jaw bone with teeth arcade',
                pathology: 'Fractures, TMJ luxation, malocclusion'
            },
            {
                id: 'scapula-left',
                name: 'Scapula',
                latinName: 'Scapula (Left)',
                detail: 'Shoulder blade with supraspinous fossa',
                pathology: 'Fractures, avulsion, OCD'
            },
            {
                id: 'scapula-right',
                name: 'Scapula',
                latinName: 'Scapula (Right)',
                detail: 'Shoulder blade with infraspinous fossa',
                pathology: 'Fractures, avulsion, OCD'
            },
            {
                id: 'humerus-left',
                name: 'Humerus',
                latinName: 'Humerus (Left)',
                detail: 'Upper forelimb bone articulating at shoulder',
                pathology: 'Fractures, medial shoulder luxation'
            },
            {
                id: 'humerus-right',
                name: 'Humerus',
                latinName: 'Humerus (Right)',
                detail: 'Upper forelimb bone articulating at shoulder',
                pathology: 'Fractures, medial shoulder luxation'
            },
            {
                id: 'radius-ulna-left',
                name: 'Radius/Ulna',
                latinName: 'Radius & Ulna (Left)',
                detail: 'Forearm bones; ulna has olecranon process',
                pathology: 'Fractures, radius curvus, hygroma'
            },
            {
                id: 'radius-ulna-right',
                name: 'Radius/Ulna',
                latinName: 'Radius & Ulna (Right)',
                detail: 'Forearm bones; ulna has olecranon process',
                pathology: 'Fractures, radius curvus, hygroma'
            },
            {
                id: 'thoracic-vertebra',
                name: 'Thoracic Vertebrae',
                latinName: 'Vertebrae Thoracicae',
                detail: '13 vertebrae with spinous processes and ribs',
                pathology: 'Fractures, IVD prolapse, spondylosis'
            },
            {
                id: 'pelvis',
                name: 'Pelvis',
                latinName: 'Pelvis',
                detail: 'Ilium, ischium, pubis forming acetabulum',
                pathology: 'Fractures, dysplasia, sacroiliac disease'
            },
            {
                id: 'femur-left',
                name: 'Femur',
                latinName: 'Femur (Left)',
                detail: 'Thigh bone with head and greater trochanter',
                pathology: 'Fractures, capital necrosis, avulsion'
            },
            {
                id: 'femur-right',
                name: 'Femur',
                latinName: 'Femur (Right)',
                detail: 'Thigh bone with head and greater trochanter',
                pathology: 'Fractures, capital necrosis, avulsion'
            },
            {
                id: 'tibia-fibula-left',
                name: 'Tibia/Fibula',
                latinName: 'Tibia & Fibula (Left)',
                detail: 'Hindbrain with tibial crest; fibula slender',
                pathology: 'Fractures, patellar luxation, ACL injury'
            },
            {
                id: 'tibia-fibula-right',
                name: 'Tibia/Fibula',
                latinName: 'Tibia & Fibula (Right)',
                detail: 'Hindbrain with tibial crest; fibula slender',
                pathology: 'Fractures, patellar luxation, ACL injury'
            },
            {
                id: 'patella-left',
                name: 'Patella',
                latinName: 'Patella (Left)',
                detail: 'Kneecap in trochlear groove of femur',
                pathology: 'Patellar luxation, fractures, arthritis'
            },
            {
                id: 'patella-right',
                name: 'Patella',
                latinName: 'Patella (Right)',
                detail: 'Kneecap in trochlear groove of femur',
                pathology: 'Patellar luxation, fractures, arthritis'
            }
        ];

        // State
        let currentMode = 'skeleton';
        let activeHotspot = null;

        // Initialize
        function init() {
            populateSidebar();
            setupEventListeners();
            createAnnotationCards();
        }

        function populateSidebar() {
            const list = document.getElementById('structuresList');
            list.innerHTML = structures.map(s => 
                `<li data-id="${s.id}">${s.name}</li>`
            ).join('');
        }

        function createAnnotationCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = structures.map(s => `
                <div class="annotation-card" data-id="${s.id}">
                    <div class="card-label">PART</div>
                    <div class="card-title">${s.name}</div>
                    <div class="card-label" style="margin-top: 8px;">LATIN</div>
                    <div class="card-latin">${s.latinName}</div>
                    <div class="card-label" style="margin-top: 8px;">DETAIL</div>
                    <div class="card-detail">${s.detail}</div>
                    <div class="card-pathology">
                        <div class="card-pathology-label">PATHOLOGY</div>
                        <div>${s.pathology}</div>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            // Hotspot clicks
            document.querySelectorAll('.hotspot').forEach(hotspot => {
                hotspot.addEventListener('click', handleHotspotClick);
            });

            // Sidebar clicks
            document.querySelectorAll('.structures-list li').forEach(item => {
                item.addEventListener('click', e => {
                    const id = e.target.dataset.id;
                    const hotspot = document.querySelector(`[data-id="${id}"]`);
                    if (hotspot) {
                        handleHotspotClick.call(hotspot);
                    }
                });
            });

            // Mode toggle
            document.getElementById('modeToggle').addEventListener('click', toggleMode);
        }

        function handleHotspotClick(e) {
            e.stopPropagation();
            const id = this.dataset.id;

            // If same hotspot clicked, toggle off
            if (activeHotspot === id) {
                closeCard();
                return;
            }

            // Close previous
            if (activeHotspot) {
                document.querySelector(`[data-id="${activeHotspot}"]`).classList.remove('active');
            }

            // Activate new
            activeHotspot = id;
            this.classList.add('active');
            showCard(id);
            updateSidebar(id);
        }

        function showCard(id) {
            const cards = document.querySelectorAll('.annotation-card');
            cards.forEach(card => {
                if (card.dataset.id === id) {
                    card.classList.add('visible');
                    card.classList.remove('faded');
                    positionCard(card);
                } else {
                    card.classList.remove('visible');
                    card.classList.add('faded');
                }
            });
        }

        function closeCard() {
            if (activeHotspot) {
                document.querySelector(`[data-id="${activeHotspot}"]`).classList.remove('active');
            }
            document.querySelectorAll('.annotation-card').forEach(card => {
                card.classList.remove('visible', 'faded');
            });
            document.querySelectorAll('.structures-list li').forEach(li => {
                li.classList.remove('active');
            });
            activeHotspot = null;
        }

        function positionCard(card) {
            const id = card.dataset.id;
            const hotspot = document.querySelector(`[data-id="${id}"] circle`);
            if (hotspot) {
                const svg = document.getElementById('anatomySvg');
                const svgRect = svg.getBoundingClientRect();
                const x = parseInt(hotspot.cx.baseVal.value);
                const y = parseInt(hotspot.cy.baseVal.value);
                
                const scale = svg.clientWidth / parseInt(svg.viewBox.baseVal.width);
                const posX = svgRect.left + x * scale + 60;
                const posY = svgRect.top + y * scale - 20;

                card.style.left = posX + 'px';
                card.style.top = posY + 'px';
            }
        }

        function updateSidebar(id) {
            document.querySelectorAll('.structures-list li').forEach(li => {
                li.classList.toggle('active', li.dataset.id === id);
            });
        }

        function toggleMode() {
            const skeleton = document.getElementById('skeleton');
            const muscles = document.getElementById('muscles');
            const button = document.getElementById('modeToggle');

            if (currentMode === 'skeleton') {
                skeleton.style.display = 'none';
                muscles.style.display = 'block';
                currentMode = 'muscle';
                button.textContent = 'Muscle Mode';
            } else {
                skeleton.style.display = 'block';
                muscles.style.display = 'none';
                currentMode = 'skeleton';
                button.textContent = 'Skeleton Mode';
            }

            // Reposition card if active
            if (activeHotspot) {
                const card = document.querySelector(`[data-id="${activeHotspot}"]`);
                if (card) {
                    setTimeout(() => positionCard(card), 100);
                }
            }
        }

        // Initialize on page load
        window.addEventListener('load', init);
    </script>
</body>
</html>
